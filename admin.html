<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Aura Clinic</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #f4f7f6; color: #333; }
        .card { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #ff99cc; color: white; }
        .status-pending { color: orange; font-weight: bold; }
        button { padding: 5px 10px; cursor: pointer; border-radius: 4px; border: 1px solid #ddd; background: #fff; }
        .btn-update { background-color: #4CAF50; color: white; border: none; margin-left: 10px; }
        .btn-update:hover { background-color: #45a049; }
        input[type="number"] { width: 60px; padding: 5px; text-align: center; }
    </style>
</head>
<body>

    <h1>Aura Clinic Backend System</h1>

    <div class="card">
        <h2>📅 รายการนัดหมายล่าสุด</h2>
        <table id="appTable">
            <thead>
                <tr>
                    <th>ชื่อลูกค้า</th>
                    <th>บริการ</th>
                    <th>วันที่</th>
                    <th>สถานะ</th>
                </tr>
            </thead>
            <tbody id="appBody"></tbody>
        </table>
    </div>

    <div class="card">
        <h2>📦 คลังเวชภัณฑ์ (Manage Stock)</h2>
        <table>
            <thead>
                <tr>
                    <th>รายการ</th>
                    <th>คงเหลือ</th>
                    <th>หน่วย</th>
                    <th>จัดการ</th>
                </tr>
            </thead>
            <tbody id="stockBody"></tbody>
        </table>
    </div>

    <script>
        
        function loadAppointments() {
            fetch('/api/appointments')
                .then(res => res.json())
                .then(data => {
                    const tbody = document.getElementById('appBody');
                    tbody.innerHTML = data.map(app => `
                        <tr>
                            <td>${app.customer_name || 'ไม่ระบุ'}</td>
                            <td>${app.service_name || 'ทั่วไป'}</td>
                            <td>${app.app_date ? new Date(app.app_date).toLocaleDateString() : '-'}</td>
                            <td class="status-pending">${app.status || 'รอดำเนินการ'}</td>
                        </tr>
                    `).join('');
                })
                .catch(err => console.error('Error:', err));
        }

    
        function loadStock() {
            fetch('/api/inventory') 
                .then(res => res.json())
                .then(data => {
                    const tbody = document.getElementById('stockBody');
                    tbody.innerHTML = data.map(item => `
                        <tr>
                            <td>${item.item_name}</td>
                            <td><input type="number" id="qty-${item.id}" value="${item.quantity}"></td>
                            <td>${item.unit}</td>
                            <td><button class="btn-update" onclick="updateStock(${item.id})">บันทึก</button></td>
                        </tr>
                    `).join('');
                });
