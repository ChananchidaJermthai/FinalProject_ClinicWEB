<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Aura Clinic</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; }
        .card { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #ff99cc; color: white; }
        .status-pending { color: orange; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Aura Clinic Backend System</h1>

    <div class="card">
        <h2>📅 รายการนัดหมายล่าสุด (Manage Appointments)</h2>
        <table id="appTable">
            <thead>
                <tr>
                    <th>ชื่อลูกค้า</th>
                    <th>บริการ</th>
                    <th>วันที่</th>
                    <th>สถานะ</th>
                </tr>
            </thead>
            <tbody id="appBody">
                </tbody>
        </table>
    </div>

    <div class="card">
        <h2>📦 คลังเวชภัณฑ์ (Manage Stock)</h2>
        <table id="stockTable">
            <thead>
                <tr>
                    <th>รายการ</th>
                    <th>คงเหลือ</th>
                    <th>จัดการ</th>
                </tr>
            </thead>
            <tbody id="stockBody">
                </tbody>
        </table>
    </div>

    <script>
       
        fetch('/api/appointments')
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('appBody');
                data.forEach(app => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${app.customer_name}</td>
                            <td>${app.service_name}</td>
                            <td>${new Date(app.app_date).toLocaleDateString()}</td>
                            <td class="status-pending">${app.status}</td>
                        </tr>
                    `;
                });
            });

        
        function updateStock(id, newQty) {
            fetch(`/api/stock/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ quantity: newQty })
            }).then(() => alert('อัปเดตสต็อกและบันทึก Log เรียบร้อย!'));
        }
    </script>
</body>
</html>
